<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Math Game: เรียงลำดับหลักร้อย (Fast Tracking)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Bai Jamjuree', sans-serif;
            overflow: hidden;
            background-color: #222; /* พื้นหลังสีดำ เพื่อไม่ให้กวนกล้อง AR */
            touch-action: none; 
        }

        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
            transform: scaleX(-1);
            display: none;
        }

        /* ---------------- รูปภาพพื้นหลังหน้า Login ---------------- */
        #login-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* เปลี่ยนลิงก์ URL ในวงเล็บเป็นรูปภาพ 16:9 ของคุณ */
            background: url('https://lh5.googleusercontent.com/d/1ggBWsYQjml1FA9Lr5_YKwMOpO2YpBQu7') center center no-repeat;
            background-size: cover; 
            z-index: 0;
        }

        #login-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            z-index: 10;
        }

        #login-screen input {
            padding: 10px;
            font-size: 18px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #ccc;
            width: 80%;
        }

        button {
            padding: 12px 25px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background-color: #ff6b6b;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover { background-color: #ff5252; }

        #game-screen {
            display: none;
            text-align: center;
            padding: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            width: 100vw;
            height: 100vh;
            position: relative;
            box-sizing: border-box;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        #drop-zone {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 50px;
            flex-wrap: nowrap;
        }

        .slot {
            width: 16vw;
            max-width: 80px;
            height: 16vw;
            max-height: 80px;
            border: 3px dashed #fff;
            border-radius: 15px;
            background: rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            color: white;
            box-sizing: border-box;
            transition: background 0.3s;
        }

        .slot.highlight {
            background: rgba(46, 213, 115, 0.6);
            border-color: #2ed573;
            transform: scale(1.05);
        }

        #draggable-numbers {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; 
        }

        .number-card {
            width: 16vw;
            max-width: 80px;
            height: 16vw;
            max-height: 80px;
            background: #feca57;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            color: #222;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            user-select: none;
            position: absolute; 
            pointer-events: auto; 
            z-index: 50;
            will-change: left, top, transform;
        }

        .number-card.snap-back {
            transition: left 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), top 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.1s;
        }

        .number-card.dragging {
            transform: scale(1.15);
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transition: none !important; 
        }

        #hand-cursor {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #ff4757;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            display: none;
            box-shadow: 0 0 15px #ff4757;
            border: 3px solid white;
            transition: none !important;
            will-change: left, top;
        }

        #emoji-feedback, #summary-popup, #loading-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #emoji-feedback { font-size: 150px; display: none; z-index: 200; text-shadow: 0 0 20px rgba(255,255,255,0.8); }

        #summary-popup {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            z-index: 300;
            color: #333;
        }

        #loading-indicator {
            display: none;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            font-size: 20px;
            z-index: 50;
        }

    </style>
</head>
<body>

    <video id="video-background" autoplay playsinline></video>
    
    <div id="login-background"></div>

    <div id="hand-cursor"></div>
    <div id="loading-indicator">⏳ กำลังโหลดระบบ AI ตรวจจับมือ...</div>

    <div id="login-screen">
        <h1>🎮 AR Math Game</h1>
        <h2>เรียงลำดับจำนวนหลักร้อย (5 จำนวน)</h2>
        <input type="text" id="playerName" placeholder="กรอกชื่อของคุณ..." required>
        <br>
        <button onclick="initGame()">เริ่มเล่นเกมเลย! 🚀</button>
    </div>

    <div id="game-screen">
        <div class="header-info">
            <span id="display-name">ผู้เล่น: -</span>
            <span id="display-level">ด่าน: 1 / 20</span>
            <span id="display-score">คะแนน: 0</span>
        </div>

        <h2>หยิบตัวเลขเรียงจาก <span style="color: #feca57;">น้อยไปมาก</span></h2>

        <div id="drop-zone">
            <div class="slot" id="slot-0"></div>
            <div class="slot" id="slot-1"></div>
            <div class="slot" id="slot-2"></div>
            <div class="slot" id="slot-3"></div>
            <div class="slot" id="slot-4"></div>
        </div>

        <div id="draggable-numbers"></div>
    </div>

    <div id="emoji-feedback"></div>

    <div id="summary-popup">
        <h1>🎉 จบเกม! 🎉</h1>
        <h2 id="final-name"></h2>
        <h3 id="final-score"></h3>
        <button onclick="location.reload()">เล่นอีกครั้ง</button>
    </div>

    <script>
        const TOTAL_LEVELS = 20;
        const POINTS_PER_LEVEL = 2;
        let currentLevel = 1;
        let score = 0;
        let playerName = "";
        let currentNumbers = [];
        let playerAnswer = [null, null, null, null, null]; 

        let draggedCard = null;
        let isPinching = false;
        const PINCH_THRESHOLD = 0.08; 

        // ระบบสร้างเสียง
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'drop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'correct') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.1); 
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.2); 
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        async function initGame() {
            const nameInput = document.getElementById('playerName').value;
            if (nameInput.trim() === "") {
                alert("กรุณากรอกชื่อก่อนเริ่มเกมครับ!");
                return;
            }
            playerName = nameInput;
            
            initAudio();

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('login-background').style.display = 'none'; // ซ่อนภาพพื้นหลัง
            document.getElementById('loading-indicator').style.display = 'block';

            await setupMediaPipe();
        }

        async function setupMediaPipe() {
            const videoElement = document.getElementById('video-background');
            const handCursor = document.getElementById('hand-cursor');

            const hands = new Hands({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }});

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 0,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    handCursor.style.display = 'block';
                    const landmarks = results.multiHandLandmarks[0];
                    
                    const indexFinger = landmarks[8];
                    const thumb = landmarks[4];

                    const screenX = (1 - indexFinger.x) * window.innerWidth;
                    const screenY = indexFinger.y * window.innerHeight;

                    handCursor.style.left = `${Math.round(screenX)}px`;
                    handCursor.style.top = `${Math.round(screenY)}px`;

                    const distance = Math.sqrt(Math.pow(indexFinger.x - thumb.x, 2) + Math.pow(indexFinger.y - thumb.y, 2));

                    if (distance < PINCH_THRESHOLD) {
                        if (!isPinching) {
                            isPinching = true;
                            attemptGrab(screenX, screenY);
                        } else if (draggedCard) {
                            const offset = draggedCard.offsetWidth / 2;
                            draggedCard.style.left = `${Math.round(screenX - offset)}px`;
                            draggedCard.style.top = `${Math.round(screenY - offset)}px`;
                            checkHoverEffect(screenX, screenY);
                        }
                    } else {
                        if (isPinching) {
                            isPinching = false;
                            clearHoverEffects();
                            if (draggedCard) attemptDrop(screenX, screenY);
                        }
                    }
                } else {
                    handCursor.style.display = 'none';
                    if (draggedCard) {
                        isPinching = false;
                        clearHoverEffects();
                        attemptDrop(-1, -1); 
                    }
                }
            });

            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 640,
                height: 480,
                facingMode: "environment"
            });

            await camera.start();
            
            videoElement.style.display = 'block';
            document.getElementById('loading-indicator').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('display-name').innerText = `ผู้เล่น: ${playerName}`;
            generateLevel();
        }

        function attemptGrab(x, y) {
            const cards = document.querySelectorAll('.number-card');
            const sortedCards = Array.from(cards).sort((a, b) => parseInt(b.style.zIndex || 0) - parseInt(a.style.zIndex || 0));

            for (let card of sortedCards) {
                const rect = card.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                    draggedCard = card;
                    draggedCard.classList.remove('snap-back');
                    draggedCard.classList.add('dragging');
                    
                    if (draggedCard.dataset.slotIndex !== undefined) {
                        playerAnswer[draggedCard.dataset.slotIndex] = null;
                        draggedCard.removeAttribute('data-slot-index');
                    }
                    break;
                }
            }
        }

        function checkHoverEffect(x, y) {
            clearHoverEffects();
            const slots = document.querySelectorAll('.slot');
            let closestSlot = null;
            let minDistance = Infinity;

            slots.forEach((slot, index) => {
                const rect = slot.getBoundingClientRect();
                const slotCenterX = rect.left + rect.width / 2;
                const slotCenterY = rect.top + rect.height / 2;
                const distance = Math.sqrt(Math.pow(x - slotCenterX, 2) + Math.pow(y - slotCenterY, 2));

                if (distance < 100 && distance < minDistance && playerAnswer[index] === null) {
                    minDistance = distance;
                    closestSlot = slot;
                }
            });

            if (closestSlot) {
                closestSlot.classList.add('highlight');
            }
        }

        function clearHoverEffects() {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('highlight'));
        }

        function attemptDrop(x, y) {
            let droppedInSlot = false;
            const slots = document.querySelectorAll('.slot');
            const value = parseInt(draggedCard.innerText);

            draggedCard.classList.add('snap-back');

            let closestSlotIndex = -1;
            let minDistance = Infinity;

            slots.forEach((slot, index) => {
                const rect = slot.getBoundingClientRect();
                const slotCenterX = rect.left + rect.width / 2;
                const slotCenterY = rect.top + rect.height / 2;
                const distance = Math.sqrt(Math.pow(x - slotCenterX, 2) + Math.pow(y - slotCenterY, 2));

                if (distance < 120 && distance < minDistance) {
                    minDistance = distance;
                    closestSlotIndex = index;
                }
            });

            if (closestSlotIndex !== -1 && playerAnswer[closestSlotIndex] === null) {
                const targetSlot = slots[closestSlotIndex];
                const rect = targetSlot.getBoundingClientRect();
                
                playSound('drop'); 
                
                draggedCard.style.left = `${rect.left}px`;
                draggedCard.style.top = `${rect.top}px`;
                draggedCard.dataset.slotIndex = closestSlotIndex;
                playerAnswer[closestSlotIndex] = value;
                droppedInSlot = true;
            }

            if (!droppedInSlot) {
                const originalIndex = parseInt(draggedCard.dataset.originalIndex);
                const cardWidth = draggedCard.offsetWidth || 80;
                const gap = window.innerWidth / 6;
                const startX = (gap * (originalIndex + 1)) - (cardWidth / 2);
                draggedCard.style.left = `${startX}px`;
                draggedCard.style.top = `${window.innerHeight - 150}px`;
            }

            draggedCard.classList.remove('dragging');
            draggedCard = null;

            if (!playerAnswer.includes(null)) {
                setTimeout(checkAnswer, 500);
            }
        }

        function generateLevel() {
            document.getElementById('display-level').innerText = `ด่าน: ${currentLevel} / ${TOTAL_LEVELS}`;
            playerAnswer = [null, null, null, null, null];
            
            currentNumbers = [];
            while(currentNumbers.length < 5) {
                let r = Math.floor(Math.random() * 899) + 100;
                if(!currentNumbers.includes(r)) currentNumbers.push(r);
            }

            renderGameArea();
        }

        function renderGameArea() {
            const dragArea = document.getElementById('draggable-numbers');
            dragArea.innerHTML = '';
            
            document.querySelectorAll('.slot').forEach(slot => {
                slot.innerText = ''; 
            });

            currentNumbers.forEach((num, index) => {
                const card = document.createElement('div');
                card.className = 'number-card snap-back';
                card.innerText = num;
                card.dataset.originalIndex = index;
                dragArea.appendChild(card);

                setTimeout(() => {
                    const cardWidth = card.offsetWidth || 80;
                    const gap = window.innerWidth / 6;
                    const startX = (gap * (index + 1)) - (cardWidth / 2);
                    
                    card.style.left = `${startX}px`;
                    card.style.top = `${window.innerHeight - 150}px`;
                }, 10);
            });
        }

        function checkAnswer() {
            const correctOrder = [...currentNumbers].sort((a, b) => a - b);
            const isCorrect = JSON.stringify(playerAnswer) === JSON.stringify(correctOrder);

            const feedback = document.getElementById('emoji-feedback');
            
            if (isCorrect) {
                playSound('correct');
                feedback.innerHTML = "✅😍";
                score += POINTS_PER_LEVEL;
                document.getElementById('display-score').innerText = `คะแนน: ${score}`;
            } else {
                playSound('wrong');
                feedback.innerHTML = "❌😢";
            }
            
            feedback.style.display = "block";
            
            setTimeout(() => {
                feedback.style.display = "none";
            }, 1200);

            setTimeout(() => {
                currentLevel++;
                if (currentLevel > TOTAL_LEVELS) {
                    endGame();
                } else {
                    generateLevel();
                }
            }, 1500);
        }

        function endGame() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('video-background').style.display = 'none';
            document.getElementById('hand-cursor').style.display = 'none';
            
            const popup = document.getElementById('summary-popup');
            document.getElementById('final-name').innerText = `คุณ ${playerName}`;
            document.getElementById('final-score').innerText = `คะแนนรวม: ${score} / ${TOTAL_LEVELS * POINTS_PER_LEVEL}`;
            popup.style.display = 'block';
        }
    </script>
</body>
</html>
